name: pr-comment

# Generic sticky-PR-comment infrastructure: any CI producer can contribute a
# named "section" to one shared comment per PR without clobbering other
# sections (today's only producer is the `benchmark` job in ci.yml, in the
# "benchmark" section below).
#
# This workflow is deliberately split from the untrusted `ci` workflow so it
# can hold `pull-requests: write` safely: `workflow_run` always executes the
# workflow file as it exists on the default branch, and never checks out or
# runs PR code — including for PRs opened from forks, where the
# `pull_request` event's token is read-only and can't comment at all. That
# split is what makes this work for every contributor, not just people with
# write access to this repo.
#
# Extension contract for adding a new section producer:
#   1. In the untrusted job that has the data (e.g. a `ci.yml` job), upload
#      an artifact containing whatever you need to render, plus a
#      `meta.json` with `{ "pr": <number> }` — see the `benchmark` job for
#      the pattern.
#   2. Add a step below (or a parallel job) that downloads YOUR artifact,
#      then validates it strictly and renders it to markdown yourself in
#      trusted code running from main — the artifact is hostile input and
#      must never be embedded as markdown verbatim. See
#      test/bench/scripts/compare.ts for the pattern: exact schema, size caps,
#      escaping.
#   3. Cross-check the artifact's claimed PR number against
#      `github.event.workflow_run.head_sha` AND cross-check the producing
#      head repo against that PR's head repo (see the benchmark section's
#      checks below). Both are needed: the SHA check stops a crafted
#      artifact from targeting an arbitrary PR, and the repo check stops
#      a fork from mirroring a victim PR's (public, content-addressed)
#      head commit to pass the SHA check with fabricated data.
#   4. Call `processBenchmarkPrComment` from
#      .github/scripts/process-pr-comment.mjs (or `upsertPrComment` from
#      pr-comment.mjs for a custom binding) with your own `sectionId` and `createIfMissing: false` (only the first/primary
#      producer should create the comment; every other producer waits for
#      it via `retries`/`retryDelayMs` so producers never race to create
#      duplicate comments).
#   5. Add your section id to `SECTION_ORDER` in pr-comment.mjs to choose
#      where it appears in the comment — sections render in that declared
#      order no matter which producer runs first, and reordering the list
#      reorders existing comments on their next update.
on:
  workflow_run:
    workflows: [ci]
    types: [completed]

permissions: {}

concurrency:
  group: pr-comment-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  comment:
    # Intentionally not gated on `conclusion == 'success'`: an unrelated ci
    # job failing (prettier, syncpack, ...) must not silently suppress a
    # section that did produce valid data. Each section gates on its own
    # artifact's presence instead (`steps.download.outcome` below).
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      # Deliberately minimal: this is the privileged `pull-requests: write`
      # job, so it does NOT `pnpm install`/build (no lifecycle scripts, no
      # cache) — it only needs Node to run the dependency-free renderer.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      - name: Download benchmark artifact
        id: download
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: benchmark-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: test/bench/.output

      # Renders trusted markdown from untrusted data: test/bench/scripts/compare.ts
      # throws (non-zero exit) on any schema violation, so a tampered or
      # malformed artifact fails this step loudly instead of silently
      # producing a bad section. Invoked directly with `node` (the script is
      # Node-stdlib-only) rather than `pnpm bench:compare`, so this job needs
      # no workspace install.
      - name: Validate and render benchmark section
        id: render
        if: steps.download.outcome == 'success'
        run: node test/bench/scripts/compare.ts --dir test/bench/.output > benchmark-section.md

      - name: Upsert benchmark section
        if: success() && steps.download.outcome == 'success'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_REPO: ${{ github.event.workflow_run.head_repository.full_name }}
        with:
          script: |
            const { processBenchmarkPrComment } = await import(
              "${{ github.workspace }}/.github/scripts/process-pr-comment.mjs"
            );

            const result = await processBenchmarkPrComment({
              github,
              context,
              metaPath: "test/bench/.output/meta.json",
              sectionContentPath: "benchmark-section.md",
              headSha: process.env.HEAD_SHA,
              headRepo: process.env.HEAD_REPO,
              workflowRunPulls:
                context.payload.workflow_run.pull_requests ?? [],
            });
            console.log(`pr-comment: ${result.action}`);
